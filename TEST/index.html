<!DOCTYPE html>
<html>
    <head>
        <style>
                -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
    --blue: #007bff;
    --indigo: #6610f2;
    --purple: #6f42c1;
    --pink: #e83e8c;
    --red: #dc3545;
    --orange: #fd7e14;
    --yellow: #ffc107;
    --green: #28a745;
    --teal: #20c997;
    --cyan: #17a2b8;
    --white: #fff;
    --gray: #6c757d;
    --gray-dark: #343a40;
    --primary: #007bff;
    --success: #28a745;
    --info: #17a2b8;
    --warning: #ffc107;
    --danger: #dc3545;
    --light: #f8f9fa;
    --dark: #343a40;
    --breakpoint-xs: 0;
    --breakpoint-sm: 576px;
    --breakpoint-md: 768px;
    --breakpoint-lg: 992px;
    --breakpoint-xl: 1200px;
    --font-family-sans-serif: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans","Liberation Sans",sans-serif,"Apple Color Emoji","Segoe UI Emoji","Segoe UI Symbol","Noto Color Emoji";
    --font-family-monospace: SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
    --crayfish: #8c2729;
    --secondary: #2A6E23;
    --secondary-rgb: 42, 110, 35;
    --curseforge-btn: #f16436;
    --modrinth-btn: #1bd96a;
    font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans","Liberation Sans",sans-serif,"Apple Color Emoji","Segoe UI Emoji","Segoe UI Symbol","Noto Color Emoji";
    font-size: 1rem;
    font-weight: 400;
    line-height: 1.5;
    color: #212529;
    text-align: left;
    box-sizing: border-box;
    position: relative;
    display: flex;
    flex-direction: column;
    min-width: 0;
    word-wrap: break-word;
    background-color: #fff;
    background-clip: border-box;
    border: 1px solid rgba(0,0,0,.125);
    margin-bottom: 1.5rem!important;
    border-radius: 0.5rem;
    box-shadow: 0 .125rem .25rem rgba(0, 0, 0, .075);
        </style>
    </head>
    <body>
        <div class="card mb-4">
    <div class="card-body p-3">
      <div id="screenshotCarousel" class="carousel slide" data-ride="carousel">
        <ol class="carousel-indicators">
                      <li data-target="#screenshotCarousel" data-slide-to="0" class="">Hello</li>
                      <li data-target="#screenshotCarousel" data-slide-to="1" class="">Hello</li>
                      <li data-target="#screenshotCarousel" data-slide-to="2" class="active">Hello</li>
                  </ol>
        <div class="carousel-inner">
                      <div class="carousel-item">
              <img class="d-block w-100" alt="First slide" src="content/mods/glasscutter/screenshots/Screenshot1.webp" data-toggle="modal" data-target="#image-0">
            </div>
                      <div class="carousel-item">
              <img class="d-block w-100" alt="First slide" src="content/mods/glasscutter/screenshots/Screenshot2.webp" data-toggle="modal" data-target="#image-1">
            </div>
                      <div class="carousel-item active">
              <img class="d-block w-100" alt="First slide" src="content/mods/glasscutter/screenshots/Screenshot3.webp" data-toggle="modal" data-target="#image-2">
            </div>
                  </div>
        <a class="carousel-control-prev" href="#screenshotCarousel" role="button" data-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="sr-only">Previous</span>
        </a>
        <a class="carousel-control-next" href="#screenshotCarousel" role="button" data-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="sr-only">Next</span>
        </a>
      </div>
    </div>
          <div class="modal fade" id="image-0" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
          <img class="w-100" alt="First slide" src="content/mods/glasscutter/screenshots/Screenshot1.webp">
        </div>
      </div>
          <div class="modal fade" id="image-1" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
          <img class="w-100" alt="First slide" src="content/mods/glasscutter/screenshots/Screenshot2.webp">
        </div>
      </div>
          <div class="modal fade" id="image-2" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
          <img class="w-100" alt="First slide" src="content/mods/glasscutter/screenshots/Screenshot3.webp">
        </div>
      </div>
        <div class="card-footer">
      <a class="btn btn-primary d-block" href="mods/glasscutter/screenshots">View All Screenshots</a>
    </div>
  </div>
  <script>document.querySelector("body > main > div.container > div.row > div.col-lg-9 > div.card.mb-4")</script>
    </body>
</html>
